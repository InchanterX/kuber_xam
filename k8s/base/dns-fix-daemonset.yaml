apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-dns-fix
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: node-dns-fix
  template:
    metadata:
      labels:
        app: node-dns-fix
    spec:
      hostNetwork: true
      hostPID: true
      tolerations:
        - operator: Exists
      initContainers:
        - name: fix-dns
          image: busybox
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              grep -q "10.96.0.10" /etc/resolv.conf || echo "nameserver 10.96.0.10" >> /etc/resolv.conf
          volumeMounts:
            - name: resolv
              mountPath: /etc/resolv.conf
      containers:
        - name: pause
          image: gcr.io/google_containers/pause:3.1
      volumes:
        - name: resolv
          hostPath:
            path: /etc/resolv.conf