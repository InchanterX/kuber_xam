apiVersion: v1
kind: Secret
metadata:
  name: messager-db-secret
  namespace: XAM-messanger
type: Opaque
stringData:
  POSTGRES_USER: "ADMIN"
  POSTGRES_PASSWORD: "ADMIN_PASSWORD"
  USER_DB_DSN: "host=postgres user=ADMIN password=ADMIN_PASSWORD dbname=users sslmode=disable"
  MSG_DB_DSN: "host=postgres user=ADMIN password=ADMIN_PASSWORD dbname=messages sslmode=disable"